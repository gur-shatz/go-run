# HELLO_PORT is passed from the parent runctl.yaml vars as an env var
title: Hello Go
description: Small example HTTP service with build and test steps.

vars:
  LOCAL_VAR: "hello-go-local-var"

watch:
  - "**/*.go"
  - "../ticker/*.md"
build:
  - "go build -o ./bin/hello-go ./main.go"
test:
  - "go test ./..."
exec:
  - echo "Hello Go build complete. Starting server... {{ .LOCAL_VAR}}"
  - "./bin/hello-go"
